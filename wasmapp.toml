[app]
name = "verificador-contabil"
version = "1.0.0"
description = "Verificador de Natureza Contábil e Consolidador de Saldos Finais/Iniciais"

[env]
NODE_ENV = "production"
PORT = "3000"

[fs]
"/app" = "."

[[command]]
name = "build"
module = "sh"
args = ["c", "cd /app && pnpm install && pnpm run build"]

[[command]]
name = "start"
module = "sh"
args = ["c", "cd /app && NODE_ENV=production node dist/index.js"]

[runner]
entrypoint = "node"
args = ["dist/index.js"]

[env.production]
NODE_ENV = "production"
